<div
  class="min-h-screen bg-gradient-to-br from-[#6A1D14] via-[#B23A22] to-[#FF7043] flex items-center justify-center px-6 py-12"
>
  <div class="max-w-3xl w-full space-y-10">
    <!-- Header -->
    <div class="text-center">
      <div
        class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center shadow-lg"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4 4h16v2H4zm0 6h16v2H4zm0 6h16v2H4z" />
        </svg>
      </div>
      <h1 class="text-4xl font-bold text-white mb-2">CS-Shop</h1>
      <h2 class="text-2xl font-semibold text-orange-100">สมัครสมาชิก</h2>
      <p class="text-orange-200/80 mt-2">เข้าร่วมร้านเกมออนไลน์ของคุณวันนี้</p>
    </div>

    <!-- ฟอร์ม -->
    <div
      class="bg-white/10 backdrop-blur-xl rounded-2xl p-10 shadow-2xl border border-white/20"
    >
      <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="space-y-7">
        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-orange-100 mb-2"
            >ชื่อผู้ใช้</label
          >
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="registerData.username"
            required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white
                   placeholder-orange-200/50 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent"
            placeholder="กรอกชื่อผู้ใช้ของคุณ"
          />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-orange-100 mb-2"
            >อีเมล</label
          >
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="registerData.email"
            required
            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white
                   placeholder-orange-200/50 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent"
            placeholder="กรอกอีเมลของคุณ"
          />
        </div>

        <!-- Password -->
        <div class="space-y-6">
          <div>
            <label for="password" class="block text-sm font-medium text-orange-100 mb-2"
              >รหัสผ่าน</label
            >
            <input
              type="password"
              id="password"
              name="password"
              [(ngModel)]="registerData.password"
              required
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white
                     placeholder-orange-200/50 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent"
              placeholder="กรอกรหัสผ่านของคุณ"
            />
          </div>

          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-orange-100 mb-2"
              >ยืนยันรหัสผ่าน</label
            >
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              required
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white
                     placeholder-orange-200/50 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent"
              placeholder="ยืนยันรหัสผ่านของคุณ"
            />
          </div>
        </div>

        <!-- Profile Image -->
        <div>
          <label for="profileImage" class="block text-sm font-medium text-orange-100 mb-2">
            รูปโปรไฟล์ (ไม่บังคับ)
          </label>

          <div
            class="flex flex-col sm:flex-row sm:items-center sm:space-x-6 space-y-4 sm:space-y-0
                   bg-white/5 border border-white/10 rounded-xl p-4"
          >
            <div class="flex-shrink-0 self-center">
              <img
                [src]="previewUrl || registerData.image || 'https://via.placeholder.com/100x100/6B7280/FFFFFF?text=No+Image'"
                alt="Profile preview"
                class="w-20 h-20 rounded-full object-cover border-2 border-white/30 transition-transform duration-300 hover:scale-105"
              />
            </div>

            <input
              type="file"
              id="profileImage"
              name="profileImage"
              accept="image/*"
              (change)="onFileSelected($event)"
              class="w-full sm:flex-1 px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white
                     file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm 
                     file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100
                     focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent"
            />
          </div>
        </div>

        <!-- Error Message -->
        <div
          *ngIf="errorMessage"
          class="bg-red-500/20 border border-red-500/40 text-red-200 px-4 py-3 rounded-lg"
        >
          {{ errorMessage }}
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading || !registerForm.form.valid"
          class="w-full bg-gradient-to-r from-orange-600 to-red-600 text-white font-semibold py-3 px-4 rounded-lg
                 hover:from-orange-700 hover:to-red-700 focus:outline-none focus:ring-2 focus:ring-orange-500
                 focus:ring-offset-2 focus:ring-offset-[#6A1D14] disabled:opacity-50 disabled:cursor-not-allowed
                 transition-all duration-200"
        >
          <span *ngIf="!isLoading">สมัครสมาชิก</span>
          <span *ngIf="isLoading" class="flex items-center justify-center">
            <svg
              class="animate-spin -ml-1 mr-3 h-5 w-5 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            กำลังสมัครสมาชิก...
          </span>
        </button>

        <!-- Login Link -->
        <div class="text-center">
          <p class="text-orange-200">
            มีบัญชีอยู่แล้ว?
            <button
              type="button"
              (click)="navigateToLogin()"
              class="text-orange-300 hover:text-orange-100 font-medium ml-1 transition-colors duration-200"
            >
              เข้าสู่ระบบ
            </button>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
